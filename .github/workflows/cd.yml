# ============================================================
# ACEest Fitness & Gym – GitHub Actions CD Pipeline
# Continuous Delivery: Docker Hub push + Kubernetes deploy
#
# Triggers: push to main (after CI passes)
#
# Jobs:
#   1. docker-push    – build & push versioned images to Docker Hub
#   2. deploy-k8s     – apply rolling-update manifests to cluster
#   3. verify         – smoke-test the deployed endpoint
#
# Required Secrets (Settings → Secrets → Actions):
#   DOCKERHUB_USERNAME  – Docker Hub username (phanibitsbyte)
#   DOCKERHUB_TOKEN     – Docker Hub Access Token (not password)
#   KUBECONFIG_DATA     – base64-encoded kubeconfig for target cluster
# ============================================================

name: CD – Docker Hub & Kubernetes Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. v3.2.4)"
        required: false
        default: "latest"

env:
  IMAGE_REPO: phanibitsbyte/aceest-fitness
  K8S_NAMESPACE: aceest-fitness

jobs:

  # ── Job 1: Build & Push to Docker Hub ──────────────────────
  docker-push:
    name: Docker Hub Push
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          TAG="${SHORT_SHA}-${{ github.run_number }}"
          echo "image_tag=${TAG}" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=${TAG}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push production image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          tags: |
            ${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_REPO }}:latest
            ${{ env.IMAGE_REPO }}:v3.2.4
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest summary
        run: |
          echo "## 🐳 Docker Hub Push" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | Repo |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ env.IMAGE_TAG }}\` | ${{ env.IMAGE_REPO }} |" >> $GITHUB_STEP_SUMMARY
          echo "| \`latest\` | ${{ env.IMAGE_REPO }} |" >> $GITHUB_STEP_SUMMARY
          echo "| \`v3.2.4\` | ${{ env.IMAGE_REPO }} |" >> $GITHUB_STEP_SUMMARY

  # ── Job 2: Deploy to Kubernetes (Rolling Update) ───────────
  deploy-k8s:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: docker-push
    environment: production

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply base Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/pvc.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Deploy Rolling Update
        run: |
          kubectl apply -f k8s/rolling-update/deployment.yaml -n ${{ env.K8S_NAMESPACE }}
          kubectl set image deployment/aceest-rolling \
            aceest-fitness=${{ env.IMAGE_REPO }}:${{ needs.docker-push.outputs.image_tag }} \
            -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/aceest-rolling \
            -n ${{ env.K8S_NAMESPACE }} --timeout=120s

      - name: Apply HPA
        run: kubectl apply -f k8s/hpa.yaml -n ${{ env.K8S_NAMESPACE }}

      - name: Show deployment status
        if: always()
        run: |
          kubectl get pods -n ${{ env.K8S_NAMESPACE }} -o wide
          kubectl get svc -n ${{ env.K8S_NAMESPACE }}

      - name: Deployment summary
        run: |
          echo "## 🚀 Kubernetes Deployment" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Strategy | Rolling Update |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.IMAGE_REPO }}:${{ needs.docker-push.outputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Namespace | \`${{ env.K8S_NAMESPACE }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Replicas | 3 |" >> $GITHUB_STEP_SUMMARY

  # ── Job 3: Rollback on failure ─────────────────────────────
  rollback-on-failure:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: deploy-k8s
    if: failure()

    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Rollback deployment
        run: |
          echo "Deployment failed — rolling back..."
          kubectl rollout undo deployment/aceest-rolling -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/aceest-rolling \
            -n ${{ env.K8S_NAMESPACE }} --timeout=60s

      - name: Rollback summary
        run: |
          echo "## ⏪ Automatic Rollback Triggered" >> $GITHUB_STEP_SUMMARY
          echo "Deployment failed. Rolled back to previous stable version." >> $GITHUB_STEP_SUMMARY
