# ============================================================
# ACEest Fitness & Gym – GitHub Actions CI/CD Pipeline
# Triggers: every push and pull_request to main / develop
#
# Jobs (in order):
#   1. build-and-lint  – install deps + flake8 syntax/style check
#   2. docker-build    – assemble the Docker container image
#   3. test            – execute Pytest INSIDE the Docker container
#   4. deploy          – tag image as stable and simulate deployment
#                        (runs only on push to main after tests pass)
# ============================================================

name: ACEest CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

jobs:

  # ----------------------------------------------------------
  # Job 1: Build & Lint
  # Compile the application and check for syntax errors.
  # ----------------------------------------------------------
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint with flake8 (syntax + style check)
        run: |
          flake8 app.py tests/ \
            --max-line-length=120 \
            --statistics \
            --count

      - name: Security scan with Bandit (SAST)
        run: |
          bandit -r app.py -ll -f txt || true

      - name: Dependency vulnerability scan (Safety)
        run: |
          safety check -r requirements.txt --output text || true

  # ----------------------------------------------------------
  # Job 2: Docker Image Assembly
  # Build the Docker container image from Dockerfile.
  # ----------------------------------------------------------
  docker-build:
    name: Docker Image Assembly
    runs-on: ubuntu-latest
    needs: build-and-lint

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -t aceest-fitness:${{ github.sha }} \
            -t aceest-fitness:latest \
            .

      - name: Verify Docker image was created
        run: docker images aceest-fitness

  # ----------------------------------------------------------
  # Job 3: Automated Testing (inside the Docker container)
  # Runs Pytest suite INSIDE the containerized environment
  # to confirm stability, per assignment requirement.
  # ----------------------------------------------------------
  test:
    name: Automated Testing (Containerized)
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build Docker image for testing
        run: docker build --target test -t aceest-fitness:test .

      - name: Run Pytest suite inside Docker container
        run: |
          docker run --rm \
            -e DB_NAME=test_aceest.db \
            -e SECRET_KEY=ci-test-secret \
            aceest-fitness:test

      - name: Run Pytest with coverage (host, for report)
        run: |
          pip install -r requirements-dev.txt
          pytest tests/ -v \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --junitxml=test-results.xml
        env:
          DB_NAME: test_aceest.db
          SECRET_KEY: ci-coverage-secret

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

      - name: Upload test results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-failure
          path: .pytest_cache/

  # ----------------------------------------------------------
  # Job 4: Deploy (main branch only)
  # Simulates a production deployment by tagging the image
  # as 'stable' and saving it as a build artifact.
  # In a real environment this job would push to a registry
  # (e.g. GHCR / Docker Hub) and restart the compose stack.
  # ----------------------------------------------------------
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build production Docker image
        run: |
          docker build \
            -t aceest-fitness:${{ github.sha }} \
            -t aceest-fitness:stable \
            .

      - name: Smoke-test production image
        run: |
          docker run -d \
            --name aceest-smoke \
            -p 5000:5000 \
            -e SECRET_KEY=smoke-test-secret \
            -e DB_NAME=/tmp/smoke.db \
            aceest-fitness:stable
          sleep 5
          curl --fail --retry 3 --retry-delay 2 http://localhost:5000/login
          docker stop aceest-smoke

      - name: Save deployment artefact (image digest)
        run: |
          echo "DEPLOYED_SHA=${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "IMAGE_TAG=aceest-fitness:stable" >> $GITHUB_STEP_SUMMARY
          echo "## ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit SHA | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image tag | \`aceest-fitness:stable\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployed by | \`${{ github.actor }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
