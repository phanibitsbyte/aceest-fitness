# ============================================================
# ACEest Fitness & Gym – GitHub Actions CI/CD Pipeline
# Triggers: every push and pull_request to main / develop
#
# Jobs (in order):
#   1. build-and-lint  – install deps + flake8 syntax/style check
#   2. docker-build    – assemble the Docker container image
#   3. test            – execute Pytest INSIDE the Docker container
# ============================================================

name: ACEest CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop

jobs:

  # ----------------------------------------------------------
  # Job 1: Build & Lint
  # Compile the application and check for syntax errors.
  # ----------------------------------------------------------
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint with flake8 (syntax + style check)
        run: |
          flake8 app.py tests/ \
            --max-line-length=120 \
            --statistics \
            --count

  # ----------------------------------------------------------
  # Job 2: Docker Image Assembly
  # Build the Docker container image from Dockerfile.
  # ----------------------------------------------------------
  docker-build:
    name: Docker Image Assembly
    runs-on: ubuntu-latest
    needs: build-and-lint

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -t aceest-fitness:${{ github.sha }} \
            -t aceest-fitness:latest \
            .

      - name: Verify Docker image was created
        run: docker images aceest-fitness

  # ----------------------------------------------------------
  # Job 3: Automated Testing (inside the Docker container)
  # Runs Pytest suite INSIDE the containerized environment
  # to confirm stability, per assignment requirement.
  # ----------------------------------------------------------
  test:
    name: Automated Testing (Containerized)
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build Docker image for testing
        run: docker build --target test -t aceest-fitness:test .

      - name: Run Pytest suite inside Docker container
        run: |
          docker run --rm \
            -e DB_NAME=test_aceest.db \
            -e SECRET_KEY=ci-test-secret \
            aceest-fitness:test

      - name: Upload test results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .pytest_cache/
