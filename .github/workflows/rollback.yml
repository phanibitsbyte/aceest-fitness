# ============================================================
# ACEest Fitness & Gym – Manual Rollback Workflow
#
# Triggered manually (workflow_dispatch) from the GitHub
# Actions UI.  Provide the Git tag or commit SHA of the
# version you want to restore (e.g. v3.2.4, or a full SHA).
#
# What it does:
#   1. Checks out the target version
#   2. Runs the Pytest suite to verify the rollback candidate
#   3. Builds a Docker image tagged as 'rollback-<sha>'
#   4. Smoke-tests the rollback image on /login
#   5. Tags it as 'stable' — ready to deploy
# ============================================================

name: Rollback to Previous Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Git tag or commit SHA to roll back to (e.g. v3.2.4)"
        required: true
        type: string

jobs:

  # ----------------------------------------------------------
  # Step 1: Validate the rollback target
  # ----------------------------------------------------------
  validate:
    name: Validate Rollback Target
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target version
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run Pytest on rollback candidate
        run: pytest tests/ -v --tb=short
        env:
          DB_NAME: rollback_test.db

  # ----------------------------------------------------------
  # Step 2: Build and smoke-test the rollback image
  # ----------------------------------------------------------
  rollback-build:
    name: Build & Smoke-test Rollback Image
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout target version
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Build rollback Docker image
        run: |
          docker build \
            -t aceest-fitness:rollback-${{ github.event.inputs.version }} \
            -t aceest-fitness:stable \
            .

      - name: Smoke-test rollback image
        run: |
          docker run -d \
            --name aceest-rollback-smoke \
            -p 5000:5000 \
            -e SECRET_KEY=rollback-smoke-secret \
            -e DB_NAME=/tmp/rollback.db \
            aceest-fitness:stable
          sleep 5
          curl --fail --retry 3 --retry-delay 2 http://localhost:5000/login
          docker stop aceest-rollback-smoke

      - name: Confirm rollback readiness
        run: |
          echo "## ⏪ Rollback Ready" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Rolled back to | \`${{ github.event.inputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image tag | \`aceest-fitness:stable\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | \`${{ github.actor }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| All tests | ✅ Passed on rollback candidate |" >> $GITHUB_STEP_SUMMARY
