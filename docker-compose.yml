# ============================================================
# ACEest Fitness & Gym – Docker Compose
#
# Services:
#   web        – Flask application  → http://localhost:5000
#   jenkins    – Jenkins CI server  → http://localhost:8080
#   sonarqube  – SonarQube server   → http://localhost:9000
#   sonardb    – PostgreSQL for SonarQube (internal)
#
# Usage:
#   Start all:       docker compose up -d
#   Rebuild images:  docker compose up -d --build
#   Stop:            docker compose down
#   Remove volumes:  docker compose down -v
#   Logs:            docker compose logs -f
#
# SonarQube first-run setup:
#   1. Open http://localhost:9000  (admin / admin — change on first login)
#   2. Create a new project: aceest-fitness
#   3. Generate a User Token (My Account → Security → Generate Token)
#   4. Add the token to Jenkins: Manage Jenkins → Credentials → SONARQUBE_TOKEN
#   5. Configure SonarQube server in Jenkins:
#        Manage Jenkins → Configure System → SonarQube servers
#        Name: SonarQube  URL: http://sonarqube:9000
#
# Jenkins first-run setup:
#   1. Open http://localhost:8080
#   2. Retrieve the initial admin password:
#        docker exec aceest-jenkins \
#          cat /var/jenkins_home/secrets/initialAdminPassword
#   3. Create a new "Pipeline" job → SCM: Git → Jenkinsfile
#   4. Click "Build Now"
# ============================================================

services:

  # ── Flask web application ──────────────────────────────────────
  web:
    build:
      context: .
      target: production
    image: aceest-fitness:latest
    container_name: aceest-fitness-app
    ports:
      - "5000:5000"
    volumes:
      - aceest_data:/app/data
    environment:
      - DB_NAME=/app/data/aceest_fitness.db
      - SECRET_KEY=${SECRET_KEY:-dev-only-change-in-production}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/login')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - aceest-net

  # ── Jenkins CI server ──────────────────────────────────────────
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    image: aceest-jenkins:latest
    container_name: aceest-jenkins
    ports:
      - "8080:8080"    # Jenkins web UI
      - "50000:50000"  # Jenkins agent / JNLP port
    volumes:
      # Persist Jenkins configuration, jobs, and build history
      - jenkins_home:/var/jenkins_home
      # Docker-outside-of-Docker: share the host Docker socket so the
      # pipeline's "Docker Build" stage can build images via docker build
      - /var/run/docker.sock:/var/run/docker.sock
    # Add jenkins user to GID 0 (root) so it can access /var/run/docker.sock
    # which Docker Desktop exposes as root:root on the socket
    group_add:
      - "0"
    environment:
      # Increase JVM heap for larger builds
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false -Xmx512m
    restart: unless-stopped
    networks:
      - aceest-net

  # ── SonarQube PostgreSQL database ─────────────────────────
  sonardb:
    image: postgres:15-alpine
    container_name: aceest-sonardb
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonarqube
    volumes:
      - sonardb_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - aceest-net

  # ── SonarQube code quality server ─────────────────────────
  sonarqube:
    image: sonarqube:10-community
    container_name: aceest-sonarqube
    depends_on:
      - sonardb
    ports:
      - "9000:9000"    # SonarQube web UI
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonardb:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    # SonarQube requires vm.max_map_count >= 524288 on Linux hosts:
    #   sudo sysctl -w vm.max_map_count=524288
    restart: unless-stopped
    networks:
      - aceest-net

networks:
  aceest-net:
    driver: bridge

volumes:
  aceest_data:
    name: aceest_data
  jenkins_home:
    name: jenkins_home
  sonardb_data:
    name: sonardb_data
  sonarqube_data:
    name: sonarqube_data
  sonarqube_logs:
    name: sonarqube_logs
  sonarqube_extensions:
    name: sonarqube_extensions

