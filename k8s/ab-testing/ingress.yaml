---
# Service for Variant A
apiVersion: v1
kind: Service
metadata:
  name: aceest-variant-a-svc
  namespace: aceest-fitness
spec:
  selector:
    app: aceest-fitness
    variant: a
  ports:
    - port: 80
      targetPort: 5000
  type: NodePort
---
# Service for Variant B
apiVersion: v1
kind: Service
metadata:
  name: aceest-variant-b-svc
  namespace: aceest-fitness
spec:
  selector:
    app: aceest-fitness
    variant: b
  ports:
    - port: 80
      targetPort: 5000
  type: ClusterIP
---
# ============================================================
# A/B Testing Ingress — cookie-based routing via NGINX
# Users without a cookie are split 50/50 (canary-weight: 50).
# Users with "variant=b" cookie always go to Variant B.
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aceest-ab-ingress
  namespace: aceest-fitness
  annotations:
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-weight: "50"
    nginx.ingress.kubernetes.io/canary-by-cookie: "variant"
spec:
  ingressClassName: nginx
  rules:
    - host: aceest.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aceest-variant-b-svc
                port:
                  number: 80
---
# Primary Ingress (Variant A — default)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aceest-ab-primary-ingress
  namespace: aceest-fitness
spec:
  ingressClassName: nginx
  rules:
    - host: aceest.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aceest-variant-a-svc
                port:
                  number: 80
