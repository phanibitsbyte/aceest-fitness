# ============================================================
# A/B Testing: Variant A — v3.2.4 (current feature set)
# NGINX Ingress routes users with cookie "variant=a" here.
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-variant-a
  namespace: aceest-fitness
  labels:
    app: aceest-fitness
    variant: a
    version: v3.2.4
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      variant: a
  template:
    metadata:
      labels:
        app: aceest-fitness
        variant: a
        version: v3.2.4
    spec:
      containers:
        - name: aceest-fitness
          image: phanibitsbyte/aceest-fitness:v3.2.4
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: aceest-config
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: aceest-secret
                  key: SECRET_KEY
            - name: AB_VARIANT
              value: "A"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /login
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
