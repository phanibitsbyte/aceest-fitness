# ============================================================
# A/B Testing: Variant B — v3.1.2 (alternative version)
# NGINX Ingress routes users with cookie "variant=b" here.
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-variant-b
  namespace: aceest-fitness
  labels:
    app: aceest-fitness
    variant: b
    version: v3.1.2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      variant: b
  template:
    metadata:
      labels:
        app: aceest-fitness
        variant: b
        version: v3.1.2
    spec:
      containers:
        - name: aceest-fitness
          image: phanibitsbyte/aceest-fitness:v3.1.2
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: aceest-config
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: aceest-secret
                  key: SECRET_KEY
            - name: AB_VARIANT
              value: "B"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /login
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: aceest-data
              mountPath: /app/data
      volumes:
        - name: aceest-data
          emptyDir: {}