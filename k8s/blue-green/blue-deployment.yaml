# ============================================================
# Blue-Green: BLUE deployment (current stable — v3.2.4)
# The live Service selector points to slot=blue by default.
# To cut over: run scripts/switch-to-green.sh
# To rollback: run scripts/rollback-to-blue.sh
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-blue
  namespace: aceest-fitness
  labels:
    app: aceest-fitness
    slot: blue
    version: v3.2.4
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aceest-fitness
      slot: blue
  template:
    metadata:
      labels:
        app: aceest-fitness
        slot: blue
        version: v3.2.4
    spec:
      containers:
        - name: aceest-fitness
          image: phanibitsbyte/aceest-fitness:v3.2.4
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: aceest-config
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: aceest-secret
                  key: SECRET_KEY
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /login
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: aceest-data
              mountPath: /app/data
      volumes:
        - name: aceest-data
          persistentVolumeClaim:
            claimName: aceest-data-pvc
