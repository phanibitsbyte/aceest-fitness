# ============================================================
# Blue-Green: Service
# Default selector routes to BLUE (current stable).
# Switch traffic by patching selector to slot=green.
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: aceest-bluegreen-svc
  namespace: aceest-fitness
  labels:
    app: aceest-fitness
    strategy: blue-green
spec:
  selector:
    app: aceest-fitness
    slot: blue          # <-- Change to "green" to cut over
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
  type: NodePort
