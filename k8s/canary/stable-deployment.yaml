# ============================================================
# Canary Release Strategy
# Stable: 9 replicas of v3.1.2 (90% traffic)
# Canary: 1 replica  of v3.2.4 (10% traffic)
# Both share the same Service via the common label app=aceest-fitness
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-stable
  namespace: aceest-fitness
  labels:
    app: aceest-fitness
    track: stable
    version: v3.1.2
spec:
  replicas: 9
  selector:
    matchLabels:
      app: aceest-fitness
      track: stable
  template:
    metadata:
      labels:
        app: aceest-fitness
        track: stable
        version: v3.1.2
    spec:
      containers:
        - name: aceest-fitness
          image: phanibitsbyte/aceest-fitness:v3.1.2
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: aceest-config
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: aceest-secret
                  key: SECRET_KEY
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /login
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: aceest-data
              mountPath: /app/data
      volumes:
        - name: aceest-data
          emptyDir: {}
