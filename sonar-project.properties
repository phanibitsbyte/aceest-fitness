# ============================================================
# SonarQube Project Configuration
# Run: sonar-scanner (from repo root)
# Requires: SONAR_HOST_URL and SONAR_TOKEN env vars or -D flags
# ============================================================
sonar.projectKey=aceest-fitness
sonar.projectName=ACEest Fitness & Gym
sonar.projectVersion=3.2.4

# Source and test directories
sonar.sources=.
sonar.inclusions=app.py,versions/**/*.py
sonar.exclusions=**/test_*.py,**/__pycache__/**,**/migrations/**,**/static/**,**/templates/**

sonar.tests=tests
sonar.test.inclusions=tests/test_*.py

# Python language
sonar.language=py

# Coverage report (generated by pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml

# Encoding
sonar.sourceEncoding=UTF-8

# Quality Gate — fail pipeline if coverage < 80% or critical bugs found
sonar.qualitygate.wait=true
